name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Run Automated Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run code quality checks
        run: |
          ruff check .

      - name: Run API tests with coverage
        run: |
          pytest

  docker-build:
    name: Build and Smoke Test Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t cicd-test-automation-api .

      - name: Run Docker container
        run: |
          docker run -d --name cicd-test-automation-api -p 8000:8000 cicd-test-automation-api

      - name: Wait for API to become healthy
        run: |
          for i in {1..10}; do
            if curl -f http://localhost:8000/health; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 3
          done
          echo "API did not become healthy"
          docker logs cicd-test-automation-api
          exit 1

      - name: Run smoke tests
        run: |
          curl -f http://localhost:8000/
          curl -f http://localhost:8000/health
          curl -f http://localhost:8000/services

      - name: Stop Docker container
        if: always()
        run: |
          docker stop cicd-test-automation-api
          docker rm cicd-test-automation-api

  publish-image:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest